name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  secret-scanning:
    name: Secret Scanning
    runs-on: vollminlab
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan commits for secrets
        run: |
          set -euo pipefail

          # Determine the commit range to scan
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LOG_OPTS="${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
          else
            BEFORE="${{ github.event.before }}"
            if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              # First push to branch — scan from the root commit
              BEFORE="$(git rev-list --max-parents=0 HEAD | tail -1)"
            fi
            LOG_OPTS="$BEFORE..${{ github.sha }}"
          fi

          echo "Scanning commits: $LOG_OPTS"

          # No allowlist: this vault holds prose and shell scripts only. Every
          # credential lives in 1Password and is materialized into the cluster by
          # ESO — nothing here should ever legitimately match a secret pattern.
          cat > .gitleaks.toml << 'GITLEAKS_CFG'
          [extend]
          useDefault = true
          GITLEAKS_CFG

          gitleaks detect \
            --config .gitleaks.toml \
            --log-opts "$LOG_OPTS" \
            --no-banner \
            --exit-code 1 || {
              echo ""
              echo "❌ Secrets detected in commits."
              echo "   Never commit plain API keys, passwords, or tokens."
              echo "   Store credentials in 1Password (Homelab vault); the cluster"
              echo "   reads them via External Secrets Operator + 1Password Connect."
              exit 1
            }

          echo "✅ No secrets detected"
